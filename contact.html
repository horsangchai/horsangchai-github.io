<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #f8fafc;
  color: #0f172a;
}

.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 80px 20px;
}

h1 {
  font-size: 42px;
  margin-bottom: 30px;
}

form {
  background: white;
  padding: 25px;
  border-radius: 16px;
  border: 1px solid #e2e8f0;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
  font-size: 16px;
}

button {
  padding: 12px 20px;
  border-radius: 999px;
  border: none;
  background: #0f172a;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  background: #1e293b;
}

.back {
  display: inline-block;
  margin-top: 30px;
  padding: 12px 20px;
  border-radius: 999px;
  text-decoration: none;
  border: 1px solid #cbd5e1;
  font-weight: 600;
}

.back:hover {
  background: #f1f5f9;
}
</style>
</head>

<body>

<div class="container">

  <h1>Contact</h1>

  <form action="https://formsubmit.co/malachihorsangchai@gmail.com" method="POST">

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" rows="6" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>

  </form>

  <a href="index.html" class="back">← Back to Home</a>

</div>

</body>
</html>
